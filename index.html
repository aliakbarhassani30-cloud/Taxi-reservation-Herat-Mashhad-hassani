<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تاکسی VIP حسنی | هرات مشهد</title>
  
  <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet" type="text/css" />

  <style>
    :root {
      --primary: #ffd700;
      --primary-hover: #ffea79;
      --bg-main: #e6f2ff; 
      --card-bg: rgba(30, 30, 30, 0.9);
      --input-bg: rgba(0, 0, 0, 0.45); 
      --text-main: #ffffff;
      --text-muted: #dcdcdc;
      --font-family: 'Vazirmatn', sans-serif;
    }

    html { scroll-behavior: smooth; }  

    body { 
      margin: 0; 
      padding: 0; 
      background: linear-gradient(135deg, #e6f2ff 0%, #b3d7ff 100%); 
      font-family: var(--font-family); 
      color: var(--text-main); 
      direction: rtl; 
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }  

    .container { 
      width: 92%; 
      max-width: 480px; 
      margin: 40px auto; 
      background: var(--card-bg); 
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 30px; 
      overflow: hidden; 
      border: 1px solid rgba(255, 215, 0, 0.3); 
      box-shadow: 0 25px 55px rgba(0, 0, 0, 0.4); 
      animation: fadeIn .8s cubic-bezier(0.16, 1, 0.3, 1); 
    }  

    @keyframes fadeIn { 
      from { opacity: 0; transform: translateY(30px) scale(0.98); } 
      to { opacity: 1; transform: translateY(0) scale(1); } 
    }  

    .header { 
      padding: 40px 25px 25px; 
      text-align: center; 
      background: linear-gradient(to bottom, rgba(0,0,0,0.5), transparent);
    }  

    .logo { 
      width: 110px; 
      height: 110px; 
      object-fit: cover; 
      border-radius: 50%; 
      border: 3px solid var(--primary); 
      margin-bottom: 20px; 
      box-shadow: 0 0 25px rgba(255,215,0,0.35); 
      transition: transform 0.5s ease;
    }  

    .header h1 { 
      margin: 0; 
      color: var(--primary); 
      font-size: 28px; 
      font-weight: 800;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
    }  

    .header p { 
      color: var(--text-muted); 
      margin-top: 12px; 
      line-height: 1.8; 
      font-size: 15px; 
    }  

    .live-meta-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      margin-top: 20px;
    }

    #clock-container, #date-container {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: rgba(255, 215, 0, 0.15);
      padding: 8px 22px;
      border-radius: 100px;
      border: 1px solid rgba(255, 215, 0, 0.4);
    }

    #date-container {
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: var(--text-main);
      font-size: 14px;
    }

    #clock { 
      font-size: 16px; 
      color: var(--primary); 
      font-weight: 700;
    }  

    .divider-line {
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255, 215, 0, 0.4), transparent);
    }

    .car-wrapper {
      margin: 20px 25px 5px;
      padding: 4px;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 20px;
      border: 1px solid rgba(255, 215, 0, 0.35); 
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.5); 
      overflow: hidden;
    }

    .car { 
      width: 100%; 
      height: 230px;  
      background: #333; 
      border-radius: 16px;
      position: relative; 
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: #666;
    }  

    .welcome-box {
      background: rgba(255, 215, 0, 0.07);
      border: 1px dashed rgba(255, 215, 0, 0.4);
      border-radius: 16px;
      padding: 15px;
      margin: 20px 30px 0;
      text-align: center;
      font-size: 14px;
      line-height: 1.6;
      color: #fff;
    }
    .welcome-box span { color: var(--primary); font-weight: bold; }

    .form-box { padding: 25px 30px 30px; }  

    label { display: block; margin-bottom: 9px; color: var(--primary); font-size: 13px; font-weight: 600; text-align: right; }  

    input, select, textarea { 
      width: 100%; 
      padding: 15px; 
      margin-bottom: 22px; 
      background: var(--input-bg); 
      color: var(--text-main); 
      box-sizing: border-box; 
      font-size: 14px; 
      font-family: var(--font-family);
      border-radius: 16px; 
      border: 1px solid rgba(255, 215, 0, 0.35); 
      transition: all .3s; 
    }  

    .date-wrapper { position: relative; width: 100%; }
    
    .custom-datepicker {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: #1e1e1e;
      border: 1px solid var(--primary);
      border-radius: 16px;
      padding: 15px;
      margin-top: -15px;
      display: none;
      z-index: 1000;
      box-shadow: 0 15px 35px rgba(0,0,0,0.6);
    }

    .datepicker-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; text-align: center; }

    .datepicker-grid span {
      font-size: 11px;
      padding: 10px 2px;
      cursor: pointer;
      border-radius: 8px;
      color: #fff;
      background: rgba(255,255,255,0.04);
    }

    .datepicker-grid span:hover { background: var(--primary); color: #000; }

    .btn { 
      width: 100%; 
      background: linear-gradient(90deg, #ffd700, #ffa500); 
      color: #000; 
      border: none; 
      padding: 18px; 
      border-radius: 16px; 
      font-size: 16px; 
      font-weight: 700; 
      cursor: pointer; 
      margin-bottom: 15px;
    }  

    .share-btn {
      width: 100%;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: var(--text-main);
      padding: 15px;
      border-radius: 16px;
      cursor: pointer;
    }

    .info { padding: 30px 20px; text-align: center; background: rgba(0, 0, 0, 0.3); }  
    .number { font-size: 19px; color: var(--primary); font-weight: 700; margin-bottom: 15px; }  

    .social-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }

    .nav-btn {
      padding: 12px; 
      border-radius: 14px; 
      font-weight: 700; 
      text-decoration: none; 
      text-align: center;
      font-size: 13px;
    }

    .btn-call { background: var(--primary); color: #000; }
    .btn-telegram { background: #26a5e4; color: #fff; grid-column: span 2; }
    .btn-site { background: #ffffff; color: #000; grid-column: span 2; }

    .whatsapp-float { 
      position: fixed; bottom: 25px; left: 25px; width: 60px; height: 60px; 
      background: #25d366; border-radius: 50%; display: flex; 
      align-items: center; justify-content: center; font-size: 28px; 
      text-decoration: none; color: white; z-index: 999; 
    }  
  </style>
</head>
<body>

  <div class="container">  
    <div class="header">  
      <h1> تاکسی VIP حسنی </h1>  
      <p> سفر راحت، سریع و مطمئن<br> هرات ⇄ مشهد </p>  
      
      <div class="live-meta-box">
        <div id="clock-container">
          <span id="clock">۰۰:۰۰:۰۰</span>
        </div>
        <div id="date-container">
          📅 امروز: <span id="shamsi-date">بارگذاری...</span>
        </div>
      </div>
    </div>  
    
    <div class="divider-line"></div>
    
    <div class="car-wrapper">
      <div class="car">تصویر خودرو</div>  
    </div>

    <div class="welcome-box">
      🚀 به گروه حمل و نقل بین‌المللی حسنی خوش آمدید! <br>
      جهت رزرو، فرم زیر را تکمیل کنید. <span>پشتیبانی ما ۲۴ ساعته فعال است.</span>
    </div>
    
    <div class="form-box">  
      <label> نام و نام خانوادگی </label>  
      <input type="text" id="name" placeholder="نام کامل شما">  
      
      <label> شماره تماس </label>  
      <input type="tel" id="phone" placeholder="0780xxxxxx">  
      
      <label> مسیر سفر </label>  
      <select id="route">  
        <option> هرات ➜ مشهد VIP </option>  
        <option> مشهد ➜ هرات VIP </option>  
      </select>  
      
      <label> تعداد مسافر </label>  
      <select id="passengers">  
        <option>1 نفر</option><option>2 نفر</option><option>3 نفر</option><option>4 نفر</option>  
      </select>  
      
      <label> تاریخ حرکت </label>  
      <div class="date-wrapper">
        <input type="text" id="date-picker-input" placeholder="انتخاب روز حرکت..." readonly onclick="toggleDatePicker()">  
        <div class="custom-datepicker" id="custom-picker">
          <div class="datepicker-grid" id="days-container"></div>
        </div>
      </div>
      
      <label> توضیحات و آدرس </label>  
      <textarea id="address" rows="4" placeholder="آدرس دقیق و توضیحات..."></textarea>  
      
      <button class="btn" onclick="sendToWhatsApp()">ثبت رزرو و ارسال به واتساپ</button>  
      <button class="share-btn" onclick="shareWebsite()">🔗 اشتراک‌گذاری با دوستان</button>
    </div>  
    
    <div class="info">  
      <div class="number">0780889098</div>  
      <div class="social-grid">
        <a href="tel:+93780889098" class="nav-btn btn-call">📞 تماس مستقیم</a>  
        <a href="https://t.me/ALIAKBAR_HASSANI" class="nav-btn btn-telegram">✈️ تلگرام</a>
        <a href="#" class="nav-btn btn-site">🌐 سایت اصلی</a>  
      </div>
    </div>  
  </div>  

  <a href="https://wa.me/93780889098" class="whatsapp-float" target="_blank">💬</a>

  <script>
    // ۱. اصلاح بخش ساعت و تاریخ زنده
    function updateLiveMeta() {
      const now = new Date();
      const clockEl = document.getElementById("clock");
      const dateEl = document.getElementById("shamsi-date");
      
      if(clockEl) clockEl.innerHTML = now.toLocaleTimeString("fa-IR");
      
      if(dateEl) {
        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        dateEl.innerHTML = new Intl.DateTimeFormat('fa-IR', options).format(now);
      }
    }
    setInterval(updateLiveMeta, 1000);
    updateLiveMeta();

    // ۲. اصلاح سیستم تقویم ۳۰ روزه
    const picker = document.getElementById('custom-picker');
    const dateInput = document.getElementById('date-picker-input');
    const daysContainer = document.getElementById('days-container');

    function toggleDatePicker() {
      picker.style.display = (picker.style.display === 'block') ? 'none' : 'block';
    }

    function generateDays() {
      if(!daysContainer) return;
      daysContainer.innerHTML = '';
      const now = new Date();
      
      for(let i = 0; i < 30; i++) {
        const futureDate = new Date();
        futureDate.setDate(now.getDate() + i);
        
        const dayStr = new Intl.DateTimeFormat('fa-IR', { day: 'numeric', month: 'short' }).format(futureDate);
        const fullDate = new Intl.DateTimeFormat('fa-IR', { year: 'numeric', month: '2-digit', day: '2-digit' }).format(futureDate);
        
        const cell = document.createElement('span');
        cell.innerText = dayStr;
        cell.onclick = function(e) {
          e.stopPropagation();
          dateInput.value = fullDate;
          picker.style.display = 'none';
        };
        daysContainer.appendChild(cell);
      }
    }
    generateDays();

    // بستن تقویم با کلیک بیرون
    document.addEventListener('click', function(e) {
      if (!e.target.closest('.date-wrapper')) {
        picker.style.display = 'none';
      }
    });

    // ۳. اصلاح دکمه واتساپ
    function sendToWhatsApp() {  
      const name = document.getElementById("name").value;  
      const phone = document.getElementById("phone").value;  
      const date = dateInput.value;  
      
      if (!name || !phone || !date) {  
        alert("لطفاً نام، شماره و تاریخ را وارد کنید.");  
        return;  
      }  
      
      const route = document.getElementById("route").value;
      const passengers = document.getElementById("passengers").value;
      const address = document.getElementById("address").value;

      const message = درخواست رزرو جدید:\n👤 نام: ${name}\n📞 تماس: ${phone}\n📅 تاریخ: ${date}\n🛣️ مسیر: ${route}\n👥 تعداد: ${passengers}\n📍 آدرس: ${address};
      
      window.open(https://wa.me/93780889098?text=${encodeURIComponent(message)}, "_blank");  
    }

    // ۴. اصلاح دکمه اشتراک گذاری
    function shareWebsite() {
      const text = "رزرو آنلاین تاکسی VIP حسنی (هرات - مشهد): ";
      const url = window.location.href;

      if (navigator.share) {
        navigator.share({ title: 'تاکسی حسنی', text: text, url: url });
      } else {
        navigator.clipboard.writeText(text + url);
        alert("لینک کپی شد! می‌توانید آن را برای دوستان خود بفرستید.");
      }
    }
  </script>
</body>
</html>
