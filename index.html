<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>تاکسی VIP حسنی</title>

  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css">

  <style>
    body {
      margin: 0;
      padding: 20px;
      background: linear-gradient(135deg, #dbefff, #9ac8ff);
      font-family: Vazirmatn, sans-serif;
      direction: rtl;
      color: #fff;
    }

    .container {
      max-width: 480px;
      margin: auto;
      background: rgba(0, 0, 0, 0.85);
      border-radius: 25px;
      overflow: hidden;
      border: 1px solid rgba(255, 215, 0, 0.4);
    }

    .header {
      text-align: center;
      padding: 30px 20px;
    }

    .logo {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      border: 3px solid gold;
      object-fit: cover;
    }

    h1 {
      color: gold;
      margin-top: 15px;
    }

    p {
      color: #ddd;
      line-height: 1.8;
    }

    .clock-box {
      margin-top: 15px;
      font-size: 15px;
      color: gold;
    }

    .car {
      width: calc(100% - 40px);
      height: 220px;
      margin: 0 auto;
      border-radius: 20px;
      background: url('./Logo.png') center/cover no-repeat;
    }

    .form-box {
      padding: 25px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: gold;
      font-size: 14px;
    }

    input,
    select,
    textarea {
      width: 100%;
      padding: 14px;
      margin-bottom: 18px;
      border-radius: 14px;
      border: 1px solid rgba(255, 215, 0, 0.4);
      background: rgba(255, 255, 255, 0.08);
      color: white;
      font-family: Vazirmatn, sans-serif;
      box-sizing: border-box;
    }

    textarea {
      min-height: 100px;
      resize: vertical;
    }

    button {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(to left, gold, orange);
      color: black;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
    }

    .info {
      text-align: center;
      padding: 25px;
    }

    .number {
      color: gold;
      font-size: 18px;
      margin-bottom: 12px;
      direction: ltr;
    }

    .links {
      display: grid;
      gap: 10px;
      margin-top: 20px;
    }

    .links a {
      text-decoration: none;
      padding: 14px;
      border-radius: 14px;
      text-align: center;
      font-weight: bold;
    }

    .call {
      background: gold;
      color: black;
    }

    .telegram {
      background: #26a5e4;
      color: white;
    }

    .site {
      background: white;
      color: black;
    }

    .whatsapp {
      position: fixed;
      left: 20px;
      bottom: 20px;
      width: 60px;
      height: 60px;
      background: #25d366;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      font-size: 28px;
      text-decoration: none;
    }
  </style>
</head>

<body>

  <div class="container">

    <div class="header">

      <img src="./Logo.png" class="logo" alt="logo">

      <h1>تاکسی VIP حسنی</h1>

      <p>
        سفر راحت، سریع و مطمئن
        <br>
        هرات ⇄ مشهد
      </p>

      <div class="clock-box">
        🕒 <span id="clock"></span>
      </div>

    </div>

    <div class="car"></div>

    <div class="form-box">

      <label>نام و نام خانوادگی</label>
      <input type="text" id="name">

      <label>شماره تماس</label>
      <input type="tel" id="phone">

      <label>مسیر سفر</label>
      <select id="route">
        <option>هرات ➜ مشهد VIP</option>
        <option>مشهد ➜ هرات VIP</option>
      </select>

      <label>تعداد مسافر</label>
      <select id="passengers">
        <option>1 نفر</option>
        <option>2 نفر</option>
        <option>3 نفر</option>
        <option>4 نفر</option>
      </select>

      <label>تاریخ حرکت</label>
      <input type="date" id="date">

      <label>آدرس و توضیحات</label>
      <textarea id="address"></textarea>

      <button id="submitBtn">
        ثبت رزرو و ارسال به واتساپ
      </button>

    </div>

    <div class="info">

      <div>افغانستان 🇦🇫</div>
      <div class="number">0780889098</div>

      <div>ایران 🇮🇷</div>
      <div class="number">09351023670</div>

      <div class="links">

        <a href="tel:+93780889098" class="call">
          📞 تماس مستقیم
        </a>

        <a href="https://t.me/ALIAKBAR_HASSANI"
          target="_blank"
          class="telegram">
          ✈️ کانال تلگرام
        </a>

        <a href="https://sites.google.com/view/taxi-herat-mashhad-hassani"
          target="_blank"
          class="site">
          🌐 سایت اصلی
        </a>

      </div>

    </div>

  </div>

  <a
    href="https://api.whatsapp.com/message/3YHT6E4WZFNLM1?autoload=1&app_absent=0"
    target="_blank"
    class="whatsapp">
    💬
  </a>

  <script>
    function updateClock() {
      const now = new Date();

      document.getElementById("clock").innerText =
        now.toLocaleTimeString("fa-IR");
    }

    updateClock();

    setInterval(updateClock, 1000);

    document
      .getElementById("submitBtn")
      .addEventListener("click", function () {

        const name =
          document.getElementById("name").value;

        const phone =
          document.getElementById("phone").value;

        const route =
          document.getElementById("route").value;

        const passengers =
          document.getElementById("passengers").value;

        const date =
          document.getElementById("date").value;

        const address =
          document.getElementById("address").value;

        if (!name || !phone || !date) {

          alert("لطفاً اطلاعات ضروری را کامل کنید");

          return;
        }

        const text =
          "سلام، درخواست رزرو دارم.%0A%0A" +
          "نام: " + name + "%0A" +
          "شماره تماس: " + phone + "%0A" +
          "مسیر: " + route + "%0A" +
          "تعداد مسافر: " + passengers + "%0A" +
          "تاریخ حرکت: " + date + "%0A" +
          "آدرس: " + address;

        const url =
          "https://wa.me/93780889098?text=" + text;

        window.open(url, "_blank");

      });
  </script>

</body>

</html>
