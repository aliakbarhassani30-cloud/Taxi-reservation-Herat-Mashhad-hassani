<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>تاکسی VIP حسنی</title>

  <!-- فونت وزیر -->
  <link rel="stylesheet" href="https://jsdelivr.net">
  
  <!-- استایل‌های تقویم شمسی -->
  <link rel="stylesheet" href="https://github.io">

  <style>
    body {
      margin: 0;
      padding: 20px;
      background: linear-gradient(135deg, #dbefff, #9ac8ff);
      font-family: Vazirmatn, sans-serif;
      direction: rtl;
      color: #fff;
    }

    .container {
      max-width: 480px;
      margin: auto;
      background: rgba(0, 0, 0, 0.85);
      border-radius: 25px;
      overflow: hidden;
      border: 1px solid rgba(255, 215, 0, 0.4);
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
    }

    .header {
      text-align: center;
      padding: 30px 20px;
    }

    .logo {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      border: 3px solid gold;
      object-fit: cover;
      transition: transform 0.5s ease;
    }

    .logo:hover {
      transform: rotate(360deg);
    }

    h1 {
      color: gold;
      margin-top: 15px;
    }

    p {
      color: #ddd;
      line-height: 1.8;
    }

    .clock-box {
      margin-top: 15px;
      font-size: 15px;
      color: gold;
    }

    .car {
      width: calc(100% - 40px);
      height: 150px;
      margin: 0 auto;
      border-radius: 20px;
      background: linear-gradient(45deg, #111, #333);
      border: 1px solid rgba(255, 215, 0, 0.2);
    }

    .form-box {
      padding: 25px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: gold;
      font-size: 14px;
    }

    input,
    select,
    textarea {
      width: 100%;
      padding: 14px;
      margin-bottom: 18px;
      border-radius: 14px;
      border: 1px solid rgba(255, 215, 0, 0.4);
      background: rgba(255, 255, 255, 0.08);
      color: white;
      font-family: Vazirmatn, sans-serif;
      box-sizing: border-box;
      transition: all 0.3s ease;
    }

    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: gold;
      background: rgba(255, 255, 255, 0.15);
      box-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
    }

    textarea {
      min-height: 100px;
      resize: vertical;
    }

    /* انیمیشن نبض برای دکمه اصلی رزرو */
    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(255, 215, 0, 0.7); }
      70% { box-shadow: 0 0 0 10px rgba(255, 215, 0, 0); }
      100% { box-shadow: 0 0 0 0 rgba(255, 215, 0, 0); }
    }

    button {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(to left, gold, orange);
      color: black;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s ease;
      animation: pulse 2s infinite;
    }

    button:hover {
      background: linear-gradient(to left, orange, gold);
      transform: translateY(-2px);
    }

    button:active {
      transform: scale(0.98);
    }

    .info {
      text-align: center;
      padding: 25px;
    }

    .number {
      color: gold;
      font-size: 18px;
      margin-bottom: 12px;
      direction: ltr;
    }

    .links {
      display: grid;
      gap: 10px;
      margin-top: 20px;
    }

    .links a {
      text-decoration: none;
      padding: 14px;
      border-radius: 14px;
      text-align: center;
      font-weight: bold;
      transition: all 0.3s ease;
    }

    .links a:hover {
      transform: translateY(-3px);
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    }

    .links a:active {
      transform: scale(0.97);
    }

    .call {
      background: gold;
      color: black;
    }

    .telegram {
      background: #26a5e4;
      color: white;
    }

    .site {
      background: white;
      color: black;
    }

    .whatsapp {
      position: fixed;
      left: 20px;
      bottom: 20px;
      width: 60px;
      height: 60px;
      background: #25d366;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      font-size: 28px;
      text-decoration: none;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      z-index: 9999;
      transition: all 0.3s ease;
    }

    .whatsapp:hover {
      transform: scale(1.1);
      box-shadow: 0 6px 20px rgba(37, 211, 102, 0.4);
    }

    /* انیمیشن و ظاهر اختصاصی تقویم شمسی */
    .pdatepicker {
      font-family: Vazirmatn, sans-serif !important;
      border-radius: 15px !important;
      border: 1px solid gold !important;
      background: #111 !important;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5) !important;
      animation: fadeInSlide 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28) forwards;
      opacity: 0;
      transform: translateY(-10px);
    }

    @keyframes fadeInSlide {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .pdatepicker table th, .pdatepicker table td {
      color: #fff !important;
    }

    .pdatepicker .selected a {
      background-color: gold !important;
      color: #000 !important;
      border-radius: 8px !important;
    }
  </style>
</head>

<body>

  <div class="container">

    <div class="header">

      <img src="./Logo.png" class="logo" alt="logo">

      <h1>تاکسی VIP حسنی</h1>

      <p>
        سفر راحت، سریع و مطمئن
        <br>
        هرات ⇄ مشهد
      </p>

      <div class="clock-box">
        🕒 <span id="clock"></span>
      </div>

    </div>

    <div class="car"></div>

    <div class="form-box">

      <label for="name">نام و نام خانوادگی</label>
      <input type="text" id="name" required placeholder="مثال: علی احمدی">

      <label for="phone">شماره تماس</label>
      <input type="tel" id="phone" required placeholder="مثال: 0780889098">

      <label for="route">مسیر سفر</label>
      <select id="route">
        <option value="هرات ➜ مشهد VIP">هرات ➜ مشهد VIP</option>
        <option value="مشهد ➜ هرات VIP">مشهد ➜ هرات VIP</option>
      </select>

      <label for="passengers">تعداد مسافر</label>
      <select id="passengers">
        <option value="1 نفر">1 نفر</option>
        <option value="2 نفر">2 نفر</option>
        <option value="3 نفر">3 نفر</option>
        <option value="4 نفر">4 نفر</option>
      </select>

      <label for="date">تاریخ حرکت</label>
      <input type="text" id="date" class="pdate" required placeholder="برای انتخاب تاریخ کلیک کنید" readonly style="cursor: pointer;">

      <label for="address">آدرس و توضیحات</label>
      <textarea id="address" placeholder="آدرس دقیق یا توضیحات اضافی (اختیاری)"></textarea>

      <button id="submitBtn">
        ثبت رزرو و ارسال به واتساپ
      </button>

    </div>

    <div class="info">

      <div>افغانستان 🇦🇫</div>
      <div class="number">0780889098</div>

      <div>ایران 🇮🇷</div>
      <div class="number">09351023670</div>

      <div class="links">

        <a href="tel:+93780889098" class="call">
          📞 تماس مستقیم
        </a>

        <a href="https://t.me"
          target="_blank"
          rel="noopener noreferrer"
          class="telegram">
          ✈️ کانال تلگرام
        </a>

        <a href="https://google.com"
          target="_blank"
          rel="noopener noreferrer"
          class="site">
          🌐 سایت اصلی
        </a>

      </div>

    </div>

  </div>

  <a
    href="https://whatsapp.com"
    target="_blank"
    rel="noopener noreferrer"
    class="whatsapp">
    💬
  </a>

  <!-- پیش‌نیازهای جاوااسکریپت تقویم شمسی -->
  <script src="https://jquery.com"></script>
  <script src="https://github.io"></script>
  <script src="https://github.io"></script>

  <script>
    $(document).ready(function() {
      $(".pdate").pDatepicker({
        format: 'YYYY/MM/DD',
        autoClose: true,
        minDate: new persianDate().valueOf(),
        navigator: {
          scroll: {
            enabled: false
          }
        }
      });
    });

    function updateClock() {
      const now = new Date();
      document.getElementById("clock").innerText = now.toLocaleTimeString("fa-IR");
    }

    updateClock();
    setInterval(updateClock, 1000);

    document.getElementById("submitBtn").addEventListener("click", function () {
      const name = document.getElementById("name").value.trim();
      const phone = document.getElementById("phone").value.trim();
      const route = document.getElementById("route").value;
      const passengers = document.getElementById("passengers").value;
      const date = document.getElementById("date").value.trim();
      const address = document.getElementById("address").value.trim();

      if (!name || !phone || !date) {
        alert("لطفاً اطلاعات ضروری (نام، شماره تماس و تاریخ) را کامل کنید");
        return;
      }

      const textMessage = 
        سلام، درخواست رزرو دارم.\n\n +
        نام: ${name}\n +
        شماره تماس: ${phone}\n +
        مسیر: ${route}\n +
        تعداد مسافر: ${passengers}\n +
        تاریخ حرکت: ${date}\n +
        آدرس: ${address ? address : 'ذکر نشده'};

      const url = "https://wa.me" + encodeURIComponent(textMessage);
      window.open(url, "_blank");
    });
  </script>

</body>

</html>
